<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valora House | Edit Profile</title>
    <meta
      name="description"
      content="Edit your profile banner, avatar and bio."
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon_io-7/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io-7/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io-7/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon_io-7/site.webmanifest" />
    <script
      src="https://kit.fontawesome.com/309152690f.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="js/pages/edit-profile.js"></script>
  </head>
  <body class="font-manrope bg-background">
    <header></header>
    <main class="my-10 flex min-h-screen items-start justify-center">
      <div
        class="mx-4 w-full max-w-md rounded-md bg-white p-6 shadow-md md:mx-0 md:max-w-3xl md:p-20"
      >
        <h1
          class="text-header-mobile mb-4 text-center font-semibold md:text-2xl"
        >
          Edit Profile
        </h1>
        <form id="editProfileForm">
          <div class="mt-8 flex flex-col gap-1">
            <label class="font-medium" for="profileBanner">Update Banner</label>
            <input
              type="url"
              id="profileBanner"
              name="profileBanner"
              placeholder="https://unsplash.com/photos/a-glass-vase-with-a-blue-and-green-design-GtAwhwOWAXo"
              class="border-border text-placeholder focus:outline-accent cursor-pointer rounded-md border px-2 py-3 text-sm"
            />
          </div>
          <div class="mt-3 flex flex-col gap-1">
            <label class="font-medium" for="profileAvatar">Update Avatar</label>
            <input
              type="url"
              id="profileAvatar"
              name="profileAvatar"
              placeholder="https://unsplash.com/photos/a-glass-vase-with-a-blue-and-green-design-GtAwhwOWAXo"
              class="border-border text-placeholder focus:outline-accent cursor-pointer rounded-md border px-2 py-3 text-sm"
            />
          </div>
          <div class="mt-3 flex flex-col gap-1">
            <label class="font-medium" for="profileBio">Update Bio</label>
            <textarea
              id="profileBio"
              placeholder="Write something about yourself..."
              class="border-border text-placeholder focus:outline-accent h-32 cursor-pointer rounded-md border px-2 py-3 text-sm"
            ></textarea>
          </div>
          <div class="mt-4 flex gap-2">
            <button
              type="submit"
              class="bg-accent hover:from-accent hover:to-accent-hover w-full cursor-pointer rounded-md from-transparent to-transparent px-2 py-3 text-white hover:bg-linear-to-r md:w-auto"
            >
              Save changes
            </button>
            <button
              type="button"
              id="cancelEdit"
              class="border-accent text-accent hover:to-accent-hover hover:from-accent w-full cursor-pointer rounded-md border bg-white px-2 py-3 hover:bg-linear-to-r hover:text-white md:w-auto md:px-8"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
