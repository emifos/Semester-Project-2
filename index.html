<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valora House | Auction</title>
    <meta
      name="description"
      content="An auction application where you can browse available listings, view details of each listing and as a logged in user create new listings."
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon_io-7/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io-7/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io-7/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon_io-7/site.webmanifest" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header></header>
    <main>
      <form>
        <div>
          <label for="searchListings">Search by listings</label>
          <input
            type="search"
            id="searchListings"
            name="q"
            placeholder="Search by title..."
          />
        </div>
        <div>
          <label for="filterListings">Filter by tags</label>
          <input
            type="search"
            id="filterListings"
            name="_tag"
            placeholder="Enter tag..."
          />
        </div>
      </form>
      <h1>Listings</h1>
    </main>
    <footer></footer>
  </body>
</html>
