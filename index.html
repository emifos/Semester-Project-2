<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valora House | Auction</title>
    <meta
      name="description"
      content="An auction application where you can browse available listings, view details of each listing and as a logged in user create new listings."
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon_io-7/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io-7/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io-7/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon_io-7/site.webmanifest" />
    <script
      src="https://kit.fontawesome.com/309152690f.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="/js/pages/listings.js"></script>
  </head>
  <body class="font-manrope">
    <header></header>
    <main class="bg-background">
      <div
        class="border-border grid grid-cols-2 gap-2 border-b bg-white md:flex md:items-start"
      >
        <form class="col-span-2 mx-3 mt-7 md:my-8 md:ml-7">
          <div class="relative">
            <label class="sr-only" for="searchListings"
              >Search by listings</label
            >
            <input
              type="search"
              id="searchListings"
              name="q"
              placeholder="Search by title..."
              class="border-border text-placeholder focus:outline-accent w-full cursor-pointer rounded-md border px-2 py-3"
            />
            <i
              class="fa-solid fa-magnifying-glass text-text absolute top-1/2 right-3 -translate-y-1/2"
            ></i>
          </div>
        </form>
        <form class="col-start-1 mb-7 ml-3 md:my-8">
          <div>
            <label class="sr-only" for="filterListings">Filter by tags</label>
            <input
              type="search"
              id="filterListings"
              name="_tag"
              placeholder="Filter by tag..."
              class="border-border focus:outline-accent text-placeholder w-full cursor-pointer rounded-md border px-2 py-3"
            />
          </div>
        </form>
        <a
          href="./create-listing.html"
          id="createListingButton"
          class="bg-accent hover:from-accent hover:to-accent-hover mr-3 mb-7 flex cursor-pointer items-center justify-center rounded-md px-3 py-2 text-lg text-white hover:bg-linear-to-r md:my-8 md:mr-7 md:ml-auto md:py-2.5 md:text-xl"
          >+ Create listing</a
        >
      </div>
      <h1 class="text-header-mobile text-text font-medium md:text-2xl">
        Listings
      </h1>
      <div class="flex justify-center">
        <div
          id="listingCards"
          class="grid items-start gap-7 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4"
        ></div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
