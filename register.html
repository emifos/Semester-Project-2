<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Register a user to log in and bid on beautiful listings."
    />
    <title>Valora House | Register</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon_io-7/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon_io-7/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io-7/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon_io-7/site.webmanifest" />
    <link rel="stylesheet" href="./css/style.css" />
    <script type="module" src="js/pages/register.js"></script>
  </head>
  <body class="font-manrope bg-background">
    <header></header>
    <main class="flex min-h-screen items-center justify-center">
      <div
        class="mx-4 w-full max-w-md rounded-md bg-white p-6 shadow-md md:mx-0 md:max-w-xl md:p-20"
      >
        <form id="registerForm">
          <div>
            <h1
              class="text-header-mobile mb-6 text-center font-semibold md:text-2xl"
            >
              Register account
            </h1>
          </div>
          <div class="mt-3 flex flex-col gap-1">
            <label class="font-medium" for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your name"
              class="border-border text-placeholder focus:outline-accent cursor-pointer rounded-md border px-2 py-3 text-sm"
              required
            />
            <span id="nameError"></span>
          </div>
          <div class="mt-3 flex flex-col gap-1">
            <label class="font-medium" for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Your email"
              class="border-border text-placeholder focus:outline-accent cursor-pointer rounded-md border px-2 py-3 text-sm"
              required
            />
            <span id="emailError"></span>
          </div>
          <div class="mt-3 flex flex-col gap-1">
            <label class="font-medium" for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create password"
              class="border-border text-placeholder focus:outline-accent cursor-pointer rounded-md border px-2 py-3 text-sm"
              required
            />
            <span id="passwordError"></span>
          </div>
          <div class="mt-2 flex flex-row-reverse justify-end gap-2 pl-1">
            <label for="terms" class="text-xs"
              >I agree to Terms & Conditions</label
            >
            <input
              type="checkbox"
              id="terms"
              name="terms"
              class="scale-150"
              required
            />
          </div>
          <div>
            <button
              type="submit"
              class="from-accent to-accent-hover mx-auto mt-8 block w-full cursor-pointer rounded-md bg-linear-to-r px-2 py-2.5 text-xl text-white"
            >
              Register
            </button>
            <div class="mt-2">
              <p class="text-center text-sm">
                Already have an account?
                <a href="login.html" class="text-sm font-semibold">Log in</a>
              </p>
            </div>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
